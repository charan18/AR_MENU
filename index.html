<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AR Menu</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Modern UI Styling */
        model-viewer::part(default-ar-button) { display: none; }
        
        .ar-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Animation for the 'Scan' prompt */
        #ar-prompt {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            pointer-events: none;
        }

        model-viewer[ar-status="session-started"] > #ar-prompt {
            display: block;
        }

        .hand-anim {
            width: 60px;
            animation: wave 2s infinite ease-in-out;
        }

        @keyframes wave {
            0%, 100% { transform: translateX(-30px) rotate(-10deg); }
            50% { transform: translateX(30px) rotate(10deg); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div class="max-w-md mx-auto p-4 min-h-screen">
        <header class="py-10 text-center">
            <h1 id="res-name" class="text-4xl font-black tracking-tighter uppercase italic text-slate-800">Menu</h1>
            <p class="text-slate-400 text-[10px] font-bold tracking-[0.2em] uppercase mt-2">Scan Table for 3D View</p>
        </header>

        <div id="menu-container" class="space-y-10 pb-20"></div>
    </div>

    <script>
        const baseUrl = window.location.href.split('index.html')[0];

        async function init() {
            try {
                const res = await fetch('data.json');
                const data = await res.json();
                document.getElementById('res-name').innerText = data.restaurant;

                const container = document.getElementById('menu-container');
                data.dishes.forEach(dish => {
                    const fullGlbPath = `${baseUrl}${dish.glb}`;
                    const fullUsdzPath = `${baseUrl}${dish.usdz}`;

                    container.innerHTML += `
                        <div class="ar-card rounded-[2.5rem] shadow-2xl shadow-slate-200 overflow-hidden">
                            <model-viewer 
                                src="${fullGlbPath}" 
                                ios-src="${fullUsdzPath}"
                                ar 
                                ar-modes="quick-look webxr scene-viewer" 
                                ar-placement="floor"
                                camera-controls 
                                touch-action="pan-y"
                                shadow-intensity="2" 
                                environment-image="neutral"
                                exposure="1"
                                auto-rotate
                                class="w-full h-80 bg-slate-100/50">
                                
                                <button slot="ar-button" class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-white/90 text-slate-900 px-8 py-3 rounded-full font-black text-xs shadow-xl active:scale-95 transition-all uppercase tracking-widest border border-slate-200">
                                    View in AR
                                </button>

                                <div id="ar-prompt">
                                    <img src="https://modelviewer.dev/shared-assets/icons/hand.png" class="hand-anim">
                                    <p class="text-[10px] font-bold text-center mt-2 uppercase text-slate-500">Scan Table</p>
                                </div>
                            </model-viewer>

                            <div class="p-8">
                                <div class="flex justify-between items-center mb-4">
                                    <h2 class="text-2xl font-bold italic tracking-tight text-slate-800">${dish.name}</h2>
                                    <span class="text-xl font-black text-indigo-600">${data.currency}${dish.price}</span>
                                </div>
                                
                                <div class="flex gap-4 mb-6">
                                    <div class="text-center">
                                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">Calories</p>
                                        <p class="text-sm font-bold text-slate-700">${dish.calories}</p>
                                    </div>
                                    <div class="w-[1px] h-8 bg-slate-200"></div>
                                    <div class="text-center">
                                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">Protein</p>
                                        <p class="text-sm font-bold text-slate-700">${dish.protein}</p>
                                    </div>
                                </div>

                                <button class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-sm shadow-lg hover:bg-black transition-colors uppercase tracking-widest">
                                    Order Now
                                </button>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                console.error("Error building menu:", e);
            }
        }
        init();
    </script>
</body>
</html>
