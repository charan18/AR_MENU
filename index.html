<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AR Menu</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        model-viewer {
            --ar-button-display: none; /* We will use our own custom button */
            background-color: #f9fafb;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900 antialiased">

    <div class="max-w-md mx-auto p-4 min-h-screen">
        <header class="py-6 mb-4 text-center">
            <h1 id="restaurant-name" class="text-3xl font-black tracking-tight text-gray-800 uppercase">Menu</h1>
            <p class="text-gray-400 text-sm mt-1">Tap a dish to see it in your space</p>
        </header>

        <div id="menu-items" class="space-y-8"></div>
    </div>

    <script>
        // Get the current URL of your site (required for Android absolute paths)
        const baseUrl = window.location.href.split('index.html')[0];

        async function loadMenu() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                
                document.getElementById('restaurant-name').innerText = data.restaurant;
                const container = document.getElementById('menu-items');

                data.dishes.forEach(dish => {
                    // CONSTRUCT FULL URLS (Fixes Android 404 errors)
                    const glbUrl = `${baseUrl}${dish.glb}`;
                    const usdzUrl = `${baseUrl}${dish.usdz}`;

                    const card = `
                    <div class="bg-white rounded-[2.5rem] shadow-xl shadow-gray-200/60 overflow-hidden border border-gray-100 transition-all">
                        <div class="relative">
                            <model-viewer 
                                src="${glbUrl}" 
                                ios-src="${usdzUrl}"
                                ar 
                                ar-modes="webxr scene-viewer quick-look" 
                                camera-controls 
                                ar-placement="floor"
                                touch-action="pan-y"
                                shadow-intensity="2" 
                                shadow-softness="1"
                                environment-image="neutral"
                                exposure="1.2"
                                auto-rotate
                                class="w-full h-80">
                                
                                <button slot="ar-button" class="absolute bottom-6 right-6 bg-orange-600 text-white px-8 py-3 rounded-full font-black text-sm shadow-2xl active:scale-95 transition-transform uppercase tracking-widest">
                                    View in AR
                                </button>
                                
                                <div slot="progress-bar" class="bg-orange-100 h-1 w-full">
                                    <div class="bg-orange-600 h-full transition-all"></div>
                                </div>
                            </model-viewer>
                        </div>

                        <div class="p-6">
                            <div class="flex justify-between items-center mb-1">
                                <h3 class="text-2xl font-extrabold italic text-gray-800">${dish.name}</h3>
                                <span class="text-xl font-bold text-orange-600">${data.currency}${dish.price}</span>
                            </div>
                            
                            <div class="flex items-center gap-3 mb-4">
                                <span class="bg-gray-100 text-gray-500 px-2 py-1 rounded text-[10px] font-bold">🔥 ${dish.calories}</span>
                                <span class="bg-gray-100 text-gray-500 px-2 py-1 rounded text-[10px] font-bold">💪 ${dish.protein}</span>
                                <div class="h-2 w-2 rounded-full ${dish.type === 'veg' ? 'bg-green-500' : 'bg-red-500'}"></div>
                            </div>

                            <p class="text-xs text-gray-400 leading-relaxed mb-6">ALLERGENS: ${dish.allergens}</p>
                            
                            <button class="w-full bg-gray-900 text-white py-4 rounded-2xl font-bold text-lg hover:bg-black transition-colors">
                                Add to Order
                            </button>
                        </div>
                    </div>`;
                    container.innerHTML += card;
                });
            } catch (error) {
                console.error("Menu loading failed. Check your data.json file!", error);
            }
        }

        loadMenu();
    </script>
</body>
</html>
