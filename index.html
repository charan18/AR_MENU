<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Menu | Pro Pilot</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        model-viewer::part(default-ar-button) { display: none; }
        .hidden { display: none !important; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader { border-top-color: transparent; border-width: 3px; animation: spin 0.8s linear infinite; }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-900 font-sans antialiased">

    <div id="ar-overlay" class="hidden fixed inset-0 bg-black/95 z-[500] flex flex-col items-center justify-center text-white text-center p-8">
        <img src="https://modelviewer.dev/shared-assets/icons/hand.png" class="w-16 mb-6 opacity-80 mx-auto">
        <h2 class="text-2xl font-bold mb-3 uppercase italic tracking-wider">Place Your Dish</h2>
        <p class="text-zinc-400 text-sm max-w-[280px] mx-auto">
            Point your camera at the table and <span class="text-white font-bold">move slowly</span>. Use two fingers to rotate.
        </p>
        <div class="mt-10 flex flex-col gap-4">
            <button onclick="startAR()" class="bg-white text-black px-12 py-4 rounded-full font-black uppercase text-xs tracking-widest active:scale-95 transition-transform">
                Open Camera
            </button>
            <button onclick="hideOverlay()" class="text-zinc-500 text-xs font-bold uppercase tracking-widest py-2">
                Cancel
            </button>
        </div>
    </div>

    <div id="ar-loading" class="hidden fixed inset-0 bg-black/90 z-[600] flex flex-col items-center justify-center text-white">
        <div class="w-10 h-10 border-4 border-white/20 rounded-full loader mb-4"></div>
        <p class="text-[10px] font-bold uppercase tracking-[0.2em]">Preparing AR...</p>
    </div>

    <div class="max-w-md mx-auto p-4 min-h-screen">
        <header class="py-12 text-center">
            <h1 id="res-name" class="text-3xl font-black italic uppercase tracking-widest text-zinc-800">AR MENU</h1>
            <div class="h-1 w-12 bg-orange-500 mx-auto mt-2"></div>
        </header>

        <div id="menu-container" class="space-y-8 pb-24">
            </div>
    </div>

    <script>
        let currentViewer = null;
        let loadingTimeout = null;
        const baseUrl = window.location.href.split('index.html')[0];

        function hideOverlay() {
            document.getElementById('ar-overlay').classList.add('hidden');
        }

        function openGuide(event, buttonElement) {
            event.preventDefault(); 
            currentViewer = buttonElement.closest('model-viewer');
            document.getElementById('ar-overlay').classList.remove('hidden');
        }

        function startAR() {
            document.getElementById('ar-overlay').classList.add('hidden');
            const loading = document.getElementById('ar-loading');
            loading.classList.remove('hidden');

            if (currentViewer) {
                currentViewer.activateAR();
                
                clearTimeout(loadingTimeout);
                loadingTimeout = setTimeout(() => {
                    loading.classList.add('hidden');
                }, 8000);
            }
        }

        async function init() {
            try {
                const res = await fetch('data.json');
                const data = await res.json();
                document.getElementById('res-name').innerText = data.restaurant;

                const container = document.getElementById('menu-container');
                
                data.dishes.forEach(dish => {
                    const dishCard = document.createElement('div');
                    dishCard.className = "bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-zinc-100";
                    
                    // FIXED: Added #allowsContentScaling=0 to enable rotation and lock size
                    dishCard.innerHTML = `
                        <model-viewer 
                            src="${baseUrl}${dish.glb}" 
                            ios-src="${baseUrl}${dish.usdz}#allowsContentScaling=0"
                            ar 
                            ar-modes="quick-look webxr" 
                            ar-placement="floor"
                            camera-controls 
                            touch-action="pan-y"
                            shadow-intensity="1.5"
                            exposure="1.2"
                            tone-mapping="commerce"
                            class="w-full h-80 bg-zinc-50">
                            
                            <button slot="ar-button" class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-zinc-900 text-white px-8 py-3 rounded-full font-black text-[10px] uppercase tracking-widest z-50">
                                View in AR
                            </button>
                        </model-viewer>

                        <div class="p-6 text-center">
                            <h2 class="text-xl font-bold uppercase italic tracking-tight">${dish.name}</h2>
                            <p class="text-orange-600 font-black mt-1 text-lg">${data.currency}${dish.price}</p>
                        </div>
                    `;

                    const viewer = dishCard.querySelector('model-viewer');
                    const arBtn = dishCard.querySelector('[slot="ar-button"]');
                    arBtn.addEventListener('click', (e) => openGuide(e, arBtn));

                    // REFINED: Handles closing camera, swiping up, or errors
                    viewer.addEventListener('ar-status', (event) => {
                        const loading = document.getElementById('ar-loading');
                        
                        if (event.detail.status === 'session-started') {
                            clearTimeout(loadingTimeout);
                            loading.classList.add('hidden');
                        }

                        if (event.detail.status === 'not-presenting') {
                            clearTimeout(loadingTimeout);
                            loading.classList.add('hidden');
                            document.getElementById('ar-overlay').classList.add('hidden');
                        }

                        if (event.detail.status === 'failed') {
                            loading.classList.add('hidden');
                        }
                    });

                    container.appendChild(dishCard);
                });

            } catch (e) { 
                console.error("Initialization error", e); 
            }
        }

        init();
    </script>
</body>
</html>
