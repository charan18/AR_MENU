<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AR Menu</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* This ensures the AR button is visible and styled properly */
        model-viewer::part(default-ar-button) {
            display: none; /* We use our own button below */
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <div class="max-w-md mx-auto p-4 min-h-screen">
        <header class="py-6 text-center">
            <h1 id="res-name" class="text-3xl font-black uppercase tracking-tighter">AR Menu</h1>
            <p class="text-gray-400 text-xs">If AR doesn't open, ensure Chrome/Safari is updated.</p>
        </header>

        <div id="menu-container" class="space-y-10">
            </div>
    </div>

    <script>
        // CRITICAL: Get the absolute base URL of your site
        const baseUrl = window.location.href.split('index.html')[0];

        async function init() {
            try {
                const res = await fetch('data.json');
                const data = await res.json();
                document.getElementById('res-name').innerText = data.restaurant;

                const container = document.getElementById('menu-container');
                data.dishes.forEach(dish => {
                    // We build the FULL path for Android Chrome's 'Intent' system
                    const fullGlbPath = `${baseUrl}${dish.glb}`;
                    const fullUsdzPath = `${baseUrl}${dish.usdz}`;

                    container.innerHTML += `
                        <div class="bg-white rounded-[2rem] shadow-2xl shadow-gray-200/50 p-2 border border-gray-100 overflow-hidden">
                            <model-viewer 
                                src="${fullGlbPath}" 
                                ios-src="${fullUsdzPath}"
                                ar 
                                ar-modes="scene-viewer webxr quick-look" 
                                ar-scale="fixed"
                                camera-controls 
                                touch-action="pan-y"
                                shadow-intensity="1.5"
                                environment-image="neutral"
                                auto-rotate
                                class="w-full h-80 bg-gray-50 rounded-[1.8rem]">
                                
                                <button slot="ar-button" class="absolute bottom-6 right-6 bg-orange-600 text-white px-8 py-3 rounded-full font-black text-xs shadow-2xl active:scale-95 transition-all uppercase tracking-widest z-50">
                                    View in your space
                                </button>

                                <div slot="progress-bar" class="w-full h-1 bg-gray-100">
                                    <div class="h-full bg-orange-500 transition-all"></div>
                                </div>
                            </model-viewer>

                            <div class="p-6">
                                <div class="flex justify-between items-center mb-2">
                                    <h2 class="text-2xl font-bold italic">${dish.name}</h2>
                                    <span class="text-xl font-bold text-orange-600">${data.currency}${dish.price}</span>
                                </div>
                                <div class="flex gap-4 text-[10px] font-bold text-gray-400 mb-4 uppercase tracking-widest">
                                    <span>🔥 ${dish.calories}</span>
                                    <span>💪 ${dish.protein}</span>
                                    <span class="${dish.type === 'veg' ? 'text-green-500' : 'text-red-500'}">● ${dish.type}</span>
                                </div>
                                <p class="text-[10px] text-gray-300 leading-tight uppercase mb-6">Allergens: ${dish.allergens}</p>
                                <button class="w-full bg-zinc-900 text-white py-4 rounded-2xl font-bold hover:bg-black transition-colors">
                                    Add to Order
                                </button>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                console.error("Error loading menu:", e);
            }
        }
        init();
    </script>
</body>
</html>
